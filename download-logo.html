<!DOCTYPE html>
<html>
<head>
  <title>Download ParaliBridge Logo</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 40px; background: #fafaf7; }
    button { padding: 12px 24px; font-size: 16px; background: #1a5c2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;}
    button:hover { background: #2d8a47; }
  </style>
</head>
<body>
  <h2>ParaliBridge Logo Generator</h2>
  <p>Here is your high-resolution 512x512 logo!</p>
  
  <canvas id="canvas" width="512" height="512" style="display:none;"></canvas>
  <img id="preview" src="" style="width: 256px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);" />
  
  <br>
  <button onclick="downloadPNG()">Download as PNG Image</button>
  
  <script>
    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32" fill="none">
  <circle cx="16" cy="16" r="16" fill="#1a5c2e" />
  <path d="M16 6C13 6 10 9 10 13c0 3 1.5 5.5 4 7v6h4v-6c2.5-1.5 4-4 4-7 0-4-3-7-6-7z" fill="#2d8a47" />
  <rect x="10" y="24" width="12" height="2" rx="1" fill="#f59e0b" />
</svg>`;

    const SVG_BLOB = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
    const URL = window.URL || window.webkitURL || window;
    const blobURL = URL.createObjectURL(SVG_BLOB);

    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById("canvas");
      canvas.getContext("2d").drawImage(img, 0, 0);
      document.getElementById("preview").src = canvas.toDataURL("image/png");
    };
    img.src = blobURL;

    function downloadPNG() {
      const a = document.createElement("a");
      a.download = "ParaliBridge-Logo.png";
      a.href = document.getElementById("canvas").toDataURL("image/png");
      a.click();
    }
  </script>
</body>
</html>
